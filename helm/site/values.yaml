image:
  repository: ghcr.io/sstathatos/sstathatos.dev
  tag: latest
  pullPolicy: Always

replicaCount: 2

containerPort: 8080

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    memory: 64Mi

ingress:
  host: sstathatos.dev
  clusterIssuer: letsencrypt-prod
  tlsSecretName: sstathatos-dev-tls
