image:
  repository: ghcr.io/sstathatos/sstathatos.dev
  # pinned by CI on every build (see .github/workflows/build.yml) — do not
  # edit by hand; git history of this line is the deploy history
  tag: "c9784a22aed35e98248b85ccbbdf62ce716e38c0"
  pullPolicy: IfNotPresent

replicaCount: 2

containerPort: 8080

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    memory: 64Mi

ingress:
  host: sstathatos.dev
  clusterIssuer: letsencrypt-prod
  tlsSecretName: sstathatos-dev-tls
