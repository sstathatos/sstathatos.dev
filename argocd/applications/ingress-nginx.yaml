# Pinned to the control-plane node with hostNetwork so it binds 80/443
# directly — matching the Terraform firewall, which only opens those ports
# on the "server" role node (terraform/modules/hetzner-cluster/main.tf).
# k3s's bundled ServiceLB/Traefik are disabled (scripts/install-k3s.sh);
# this replaces both.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.13.0
    helm:
      values: |
        controller:
          kind: Deployment
          replicaCount: 1
          hostNetwork: true
          hostPort:
            enabled: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          service:
            type: ClusterIP
          publishService:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
