apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: default
  namespace: argocd
spec:
  description: Default project — everything on this single-tenant cluster
  sourceRepos:
    - "https://github.com/sstathatos/sstathatos.dev"
    - "https://kubernetes.github.io/ingress-nginx"
    - "https://charts.jetstack.io"
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
